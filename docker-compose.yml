services:
  rezio:
    build: .
    ports:
      - "3000:3000"
    environment:
      # baza SQLite na wolumenie (produkcyjnie: Postgres — patrz README)
      DATABASE_URL: "file:/app/data/prod.db"
      APP_URL: "${APP_URL:-http://localhost:3000}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      EMAIL_FROM: "${EMAIL_FROM:-Rezio <onboarding@resend.dev>}"
    volumes:
      - rezio-data:/app/data
      - rezio-uploads:/app/public/uploads
    restart: unless-stopped

volumes:
  rezio-data:
  rezio-uploads:
