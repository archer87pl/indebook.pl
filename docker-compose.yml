services:
  hostimo:
    build: .
    ports:
      - "3000:3000"
    environment:
      # baza SQLite na wolumenie (produkcyjnie: Postgres — patrz README)
      DATABASE_URL: "file:/app/data/prod.db"
      APP_URL: "${APP_URL:-http://localhost:3000}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      EMAIL_FROM: "${EMAIL_FROM:-Hostimo <onboarding@resend.dev>}"
      P24_MERCHANT_ID: "${P24_MERCHANT_ID:-}"
      P24_POS_ID: "${P24_POS_ID:-}"
      P24_API_KEY: "${P24_API_KEY:-}"
      P24_CRC: "${P24_CRC:-}"
      P24_SANDBOX: "${P24_SANDBOX:-true}"
    volumes:
      - hostimo-data:/app/data
      - hostimo-uploads:/app/public/uploads
    restart: unless-stopped

volumes:
  hostimo-data:
  hostimo-uploads:
